name: Release Binaries

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

jobs:
  build-and-upload:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: liyab-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: liyab-macos-amd64
          - os: macos-14 # ARM64 runner for Apple Silicon
            target: aarch64-apple-darwin
            artifact_name: liyab-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: liyab-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Build Release Binary
        run: cargo build --release --manifest-path server-native/Cargo.toml --target ${{ matrix.target }}

      - name: Upload Binary to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/server-native${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          asset_name: ${{ matrix.artifact_name }}
          tag: ${{ github.ref }}
          overwrite: true
