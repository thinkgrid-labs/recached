name: Publish Wasm Package to NPM

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build and publish recached-edge to NPM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "recached-wasm-cache"

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Build Wasm package
        run: wasm-pack build wasm-edge --target web --release --out-name recached-edge

      - name: Copy LICENSE into package
        run: cp LICENSE.md wasm-edge/pkg/LICENSE.md

      - name: Set package name
        # wasm-pack derives the npm name from the crate name, ignoring any custom package.json.
        # Patch the generated pkg/package.json to use the correct published name.
        run: |
          node -e "
            const fs = require('fs');
            const path = 'wasm-edge/pkg/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.name = 'recached-edge';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            console.log('Package name set to:', pkg.name);
          "

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd wasm-edge/pkg && npm publish --access public
